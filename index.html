<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="
    default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;
    script-src * 'unsafe-inline' 'unsafe-eval';
    style-src * 'unsafe-inline';
    img-src * data: blob:;
    connect-src *;
  ">
  <title>Allai - 제약 영업 실무 도구</title>

  <style>
    :root {
      --green: #00C07F;
      --green2: #00A36C;
      --text: #111111;
      --sub: #6E6E73;
      --card: rgba(255,255,255,0.9);
      --line: rgba(255,255,255,0.78);
      --shadow: 0 18px 50px rgba(0,80,50,0.08);
      --red: #ef4444;
      --yellow: #f59e0b;
      --blue: #3b82f6;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; min-height: 100%; overflow-x: hidden; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Segoe UI', sans-serif;
      background:
        radial-gradient(circle at top left, rgba(0,192,127,0.10), transparent 40%),
        linear-gradient(180deg, #F0FAF5 0%, #E4F5EC 100%);
      color: var(--text);
    }
    .phone-shell {
      width: 100%; max-width: 430px;
      background: rgba(255,255,255,0.62);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.75);
      border-radius: 38px;
      box-shadow: var(--shadow);
      padding: 16px;
      overflow: hidden;
    }
    .view-container {
      position: relative;
      min-height: 760px;
      padding: 24px 18px 20px;
      border-radius: 30px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,0.92), rgba(255,255,255,0.82));
    }
    .dev-credit { position: absolute; bottom: 14px; right: 18px; font-size: 0.72rem; color: rgba(110,110,115,0.85); }
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
    .brand { font-size: 0.95rem; font-weight: 800; letter-spacing: -0.02em; }
    .brand span { color: var(--green); }
    .beta-badge {
      display: inline-flex; align-items: center;
      padding: 3px 8px; border-radius: 999px;
      background: rgba(0,192,127,0.12); color: var(--green2);
      font-size: 0.68rem; font-weight: 800;
      border: 1px solid rgba(0,192,127,0.2); margin-left: 6px;
    }
    .step-chip { padding: 6px 12px; border-radius: 999px; background: rgba(0,192,127,0.10); color: var(--green2); font-size: 0.78rem; font-weight: 700; }
    .screen { display: none; animation: fadeUp 0.28s ease; }
    .screen.active { display: block; }
    .hero { margin: 0 0 20px; text-align: left; position: relative; border-radius: 22px; overflow: hidden; min-height: 180px; background: #111; }
    .hero img { width: 100%; height: 180px; object-fit: cover; object-position: center 20%; opacity: 0.55; display: block; border-radius: 22px; }
    .hero-overlay { position: absolute; left: 0; right: 0; bottom: 0; padding: 18px 18px 16px; background: linear-gradient(transparent, rgba(0,0,0,0.7)); }
    .hero h1 { margin: 0 0 6px; font-size: 2.35rem; color: #fff; letter-spacing: -0.05em; line-height: 1.02; font-weight: 900; text-shadow: 0 3px 10px rgba(0,0,0,0.28); }
    .hero p { margin: 0; color: rgba(255,255,255,0.80); font-size: 0.88rem; }
    .hero-title { margin: 0 0 8px; font-size: 1.52rem; line-height: 1.2; letter-spacing: -0.04em; font-weight: 800; }
    .subtext { margin: 0; color: var(--sub); font-size: 0.92rem; line-height: 1.5; }
    .card-list { display: grid; gap: 14px; margin: 22px 0; }
    .choice-card {
      text-align: left; padding: 18px 16px;
      background: var(--card); border: 1px solid rgba(255,255,255,0.9);
      border-radius: 22px; box-shadow: 0 8px 24px rgba(0,80,50,0.04);
      cursor: pointer; transition: all 0.2s ease; width: 100%;
    }
    .choice-card:hover { transform: translateY(-2px); box-shadow: 0 14px 32px rgba(0,192,127,0.14); }
    .choice-top { display: flex; justify-content: space-between; align-items: center; gap: 14px; }
    .choice-card h3 { margin: 0; font-size: 1.05rem; letter-spacing: -0.02em; font-weight: 700; }
    .choice-card p { margin: 6px 0 0; font-size: 0.88rem; color: var(--sub); line-height: 1.45; }
    .icon-badge { width: 44px; height: 44px; border-radius: 14px; display: flex; align-items: center; justify-content: center; background: rgba(0,192,127,0.12); font-size: 1.3rem; flex-shrink: 0; }
    .search-wrap { position: relative; margin-bottom: 14px; }
    .search-input {
      width: 100%; padding: 16px 92px 16px 18px;
      border-radius: 20px; border: 1px solid rgba(17,17,17,0.08);
      background: rgba(255,255,255,0.96); font-size: 1rem; outline: none; transition: all 0.2s;
    }
    .search-input:focus { border-color: rgba(0,192,127,0.5); box-shadow: 0 0 0 4px rgba(0,192,127,0.10); }
    .search-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: var(--green); color: #fff; border: none; border-radius: 12px; padding: 8px 14px; font-size: 0.85rem; font-weight: 700; cursor: pointer; }
    .result-list { display: grid; gap: 10px; margin-top: 12px; max-height: 520px; overflow-y: auto; }
    .result-item { padding: 14px 16px; background: var(--card); border: 1px solid rgba(255,255,255,0.9); border-radius: 18px; cursor: pointer; transition: all 0.18s; }
    .result-item:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(0,192,127,0.10); }
    .result-name { font-size: 1rem; font-weight: 700; letter-spacing: -0.02em; }
    .result-sub { font-size: 0.82rem; color: var(--sub); margin-top: 3px; }
    .result-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
    .badge { display: inline-block; padding: 4px 10px; border-radius: 999px; font-size: 0.74rem; font-weight: 700; }
    .badge-green { background: rgba(0,192,127,0.12); color: var(--green2); }
    .badge-red { background: rgba(239,68,68,0.12); color: #b91c1c; }
    .badge-yellow { background: rgba(245,158,11,0.12); color: #92400e; }
    .badge-blue { background: rgba(59,130,246,0.12); color: #1d4ed8; }
    .badge-gray { background: rgba(110,110,115,0.10); color: var(--sub); }
    .detail-section { margin-bottom: 18px; }
    .section-title { font-size: 0.78rem; font-weight: 700; color: var(--sub); letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 10px; }
    .info-card { padding: 16px; background: rgba(255,255,255,0.92); border: 1px solid rgba(255,255,255,0.95); border-radius: 20px; box-shadow: 0 4px 16px rgba(0,80,50,0.04); }
    .info-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; padding: 9px 0; border-bottom: 1px solid rgba(0,0,0,0.05); font-size: 0.9rem; }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: var(--sub); font-size: 0.85rem; flex-shrink: 0; }
    .info-value { font-weight: 700; letter-spacing: -0.01em; text-align: right; word-break: break-word; }
    .risk-bar { display: flex; align-items: center; gap: 10px; padding: 14px 16px; border-radius: 18px; margin-bottom: 10px; }
    .risk-low { background: rgba(0,192,127,0.08); border: 1px solid rgba(0,192,127,0.15); }
    .risk-mid { background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.15); }
    .risk-high { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.15); }
    .risk-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .risk-dot-low { background: var(--green); }
    .risk-dot-mid { background: var(--yellow); }
    .risk-dot-high { background: var(--red); }
    .risk-text { font-size: 0.85rem; line-height: 1.45; flex: 1; }
    .icd-chip { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 14px; background: rgba(59,130,246,0.08); border: 1px solid rgba(59,130,246,0.12); margin: 4px; font-size: 0.84rem; cursor: pointer; transition: all 0.15s; }
    .icd-chip:hover { background: rgba(59,130,246,0.15); }
    .icd-code { font-weight: 800; color: #1d4ed8; }
    .icd-name { color: var(--sub); font-size: 0.8rem; }
    .comp-card { display: flex; justify-content: space-between; align-items: center; gap: 12px; padding: 13px 16px; background: rgba(255,255,255,0.92); border: 1px solid rgba(255,255,255,0.95); border-radius: 16px; margin-bottom: 8px; }
    .comp-name { font-weight: 700; font-size: 0.95rem; }
    .comp-co { font-size: 0.8rem; color: var(--sub); margin-top: 2px; }
    .comp-price { font-weight: 800; color: var(--green2); font-size: 0.95rem; }
    .btn-back { background: none; border: none; color: var(--sub); font-size: 0.88rem; cursor: pointer; padding: 0; margin-bottom: 18px; display: flex; align-items: center; gap: 4px; }
    .empty-text { padding: 20px; text-align: center; color: var(--sub); font-size: 0.9rem; }
    .tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
    .tab-btn { padding: 7px 14px; border-radius: 999px; background: rgba(0,0,0,0.05); border: none; font-size: 0.82rem; font-weight: 700; cursor: pointer; color: var(--sub); transition: all 0.15s; }
    .tab-btn.active { background: var(--green); color: #fff; }

    /* AI 요약 카드 */
    .ai-card {
      background: linear-gradient(135deg, rgba(0,192,127,0.08), rgba(59,130,246,0.06));
      border: 1px solid rgba(0,192,127,0.2);
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 18px;
    }
    .ai-card-title { font-size: 0.78rem; font-weight: 800; color: var(--green2); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
    .ai-card-body { font-size: 0.88rem; line-height: 1.65; color: var(--text); }

    /* MR 포인트 카드 */
    .mr-card {
      background: linear-gradient(135deg, rgba(245,158,11,0.08), rgba(245,158,11,0.04));
      border: 1px solid rgba(245,158,11,0.2);
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 18px;
    }
    .mr-card-title { font-size: 0.78rem; font-weight: 800; color: #92400e; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
    .mr-point { display: flex; gap: 8px; margin-bottom: 8px; font-size: 0.86rem; line-height: 1.5; }
    .mr-num { width: 20px; height: 20px; border-radius: 50%; background: rgba(245,158,11,0.2); color: #92400e; font-size: 0.72rem; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; }

    /* 적응증/용법 한줄 */
    .drug-efcy { font-size: 0.82rem; color: var(--sub); margin-top: 6px; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    .loading-dot { animation: pulse 1.2s ease infinite; }
  </style>
</head>

<body>
<div class="phone-shell">
  <div class="view-container">
    <div class="dev-credit">dev. junho.kim</div>

    <div class="topbar">
      <div class="brand">All<span>ai</span><span class="beta-badge">BETA</span></div>
      <div class="step-chip" id="stepChip">홈</div>
    </div>

    <!-- 화면 1: 메인 -->
    <div class="screen active" id="screen1">
      <div class="hero">
        <img src="/sales.jpg" alt="영업사원" />
        <div class="hero-overlay">
          <h1>면담<br>1분 전</h1>
          <p id="heroMsg"></p>
        </div>
      </div>

      <div class="card-list">
        <button class="choice-card" onclick="goScreen('screen2','약품 검색')">
          <div class="choice-top">
            <div><h3>💊 약품 검색</h3><p>제품명 · 성분명 · 보험코드로 검색</p></div>
            <div class="icon-badge">🔍</div>
          </div>
        </button>
        <button class="choice-card" onclick="goScreen('screen_icd','상병코드')">
          <div class="choice-top">
            <div><h3>🏥 상병코드 조회</h3><p>질환명 또는 코드로 관련 약품 확인</p></div>
            <div class="icon-badge">📋</div>
          </div>
        </button>
        <button class="choice-card" onclick="goScreen('screen_comp','경쟁품 비교')">
          <div class="choice-top">
            <div><h3>⚔️ 경쟁품 비교</h3><p>성분·계열별 경쟁제품 한눈에 비교</p></div>
            <div class="icon-badge">📊</div>
          </div>
        </button>
        <button class="choice-card" onclick="goScreen('screen_cut','삭감 조회')">
          <div class="choice-top">
            <div><h3>⚠️ 삭감 위험 조회</h3><p>처방 시 삭감 가능성 미리 확인</p></div>
            <div class="icon-badge">🛡️</div>
          </div>
        </button>
        <button class="choice-card" onclick="goScreen('screen_stat','처방 통계')">
          <div class="choice-top">
            <div><h3>📈 처방 통계 추이</h3><p>지역별 · 성분별 · 품목별 처방 그래프</p></div>
            <div class="icon-badge">📉</div>
          </div>
        </button>
      </div>
    </div>

    <!-- 화면 2: 약품 검색 -->
    <div class="screen" id="screen2">
      <button class="btn-back" onclick="goScreen('screen1','홈')">← 홈</button>
      <div class="hero-title">약품 검색</div>
      <p class="subtext">제품명, 성분명, 보험코드 입력</p>
      <div class="search-wrap">
        <input class="search-input" id="drugSearch" placeholder="예) 라베프라졸, 케이캡, 215700ATB" oninput="searchDrug()" />
        <button class="search-btn" onclick="searchDrug()">검색</button>
      </div>
      <div class="tabs">
        <button class="tab-btn active" onclick="setSearchType('all',this)">전체</button>
        <button class="tab-btn" onclick="setSearchType('product',this)">제품명</button>
        <button class="tab-btn" onclick="setSearchType('ingredient',this)">성분명</button>
        <button class="tab-btn" onclick="setSearchType('code',this)">보험코드</button>
      </div>
      <div id="drugResults" class="result-list">
        <div class="empty-text">약품명을 입력해주세요</div>
      </div>
    </div>

    <!-- 화면 3: 약품 상세 -->
    <div class="screen" id="screen3">
      <button class="btn-back" id="backBtn" onclick="goScreen('screen2','약품 검색')">← 검색</button>
      <div id="drugDetail"></div>
    </div>

    <!-- 화면: 상병코드 조회 -->
    <div class="screen" id="screen_icd">
      <button class="btn-back" onclick="goScreen('screen1','홈')">← 홈</button>
      <div class="hero-title">상병코드 조회</div>
      <p class="subtext">질환명 또는 ICD코드로 검색</p>
      <div class="search-wrap">
        <input class="search-input" id="icdSearch" placeholder="예) 위식도역류, K21, 당뇨" oninput="searchICD()" />
        <button class="search-btn" onclick="searchICD()">검색</button>
      </div>
      <div id="icdResults" class="result-list">
        <div class="empty-text">질환명 또는 코드를 입력해주세요</div>
      </div>
    </div>

    <!-- 화면: 경쟁품 비교 -->
    <div class="screen" id="screen_comp">
      <button class="btn-back" onclick="goScreen('screen1','홈')">← 홈</button>
      <div class="hero-title">경쟁품 비교</div>
      <p class="subtext">성분·계열로 경쟁제품 비교</p>
      <div class="search-wrap">
        <input class="search-input" id="compSearch" placeholder="예) 라베프라졸, PPI, 케이캡" oninput="searchComp()" />
        <button class="search-btn" onclick="searchComp()">검색</button>
      </div>
      <div id="compResults" class="result-list">
        <div class="empty-text">성분명 또는 약품명을 입력해주세요</div>
      </div>
    </div>

    <!-- 화면: 삭감 조회 -->
    <div class="screen" id="screen_cut">
      <button class="btn-back" onclick="goScreen('screen1','홈')">← 홈</button>
      <div class="hero-title">삭감 위험 조회</div>
      <p class="subtext">처방 전 삭감 가능성 확인</p>
      <div class="search-wrap">
        <input class="search-input" id="cutSearch" placeholder="예) 라베프라졸, 케이캡" oninput="searchCut()" />
        <button class="search-btn" onclick="searchCut()">검색</button>
      </div>
      <div id="cutResults" class="result-list">
        <div class="empty-text">약품명을 입력해주세요</div>
      </div>
    </div>

    <!-- 화면: 처방 통계 -->
    <div class="screen" id="screen_stat">
      <button class="btn-back" onclick="goScreen('screen1','홈')">← 홈</button>
      <div class="hero-title">처방 통계 추이</div>
      <p class="subtext">지역별 · 성분별 · 품목별 비교</p>
      <div class="tabs" id="statTypeTabs">
        <button class="tab-btn active" onclick="setStatType('region',this)">지역별</button>
        <button class="tab-btn" onclick="setStatType('ingredient',this)">성분별</button>
        <button class="tab-btn" onclick="setStatType('product',this)">품목별</button>
      </div>
      <div id="statContent"></div>
    </div>

  </div>
</div>

<script>
/* ===== 샘플 데이터 ===== */
const DRUGS = [

function searchDrug() {
  const q = document.getElementById('drugSearch').value.trim();
  const el = document.getElementById('drugResults');
  if (!q) { el.innerHTML = '<div class="empty-text">약품명을 입력해주세요</div>'; return; }
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => fetchDrug(q), 350);
}

async function fetchDrug(q) {
  const el = document.getElementById('drugResults');
  el.innerHTML = '<div class="empty-text loading-dot">검색 중... ⏳</div>';
  try {
    const res = await fetch(`https://drug-ede5bi7c3q-du.a.run.app?name=${encodeURIComponent(q)}`);
    const data = await res.json();
    const items = data.items || [];
    if (!items.length) { renderDrugListLocal(q, el); return; }
    _apiResults = items;
    el.innerHTML = items.map((item, i) => {
      const name = item.ITEM_NAME || item.itemName || '-';
      const ingr = item.INGR_NAME_KOR || item.ingrNameKor || '';
      const company = item.ENTP_NAME || item.entpName || '';
      const form = item.FORM_CODE_NAME || item.formCodeName || '-';
      const permitDate = item.ITEM_PERMIT_DATE || item.itemPermitDate || '-';
      const efcy = item.efcyQesitm || '';
      const useMethod = item.useMethodQesitm || '';
      return `
        <div class="result-item" onclick="showDrugAPI(${i})">
          <div class="result-name">${name}</div>
          <div class="result-sub">${ingr} · ${company}</div>
          <div class="result-badges">
            <span class="badge badge-green">🌐 실시간</span>
            <span class="badge badge-gray">${form}</span>
            <span class="badge badge-gray">허가 ${permitDate}</span>
          </div>
          ${efcy ? `<div class="drug-efcy">📌 ${efcy.replace(/<[^>]+>/g,'').substring(0,60)}…</div>` : ''}
          ${useMethod ? `<div class="drug-efcy">💊 ${useMethod.replace(/<[^>]+>/g,'').substring(0,50)}…</div>` : ''}
        </div>`;
    }).join('');
  } catch(e) {
    renderDrugListLocal(q, el);
  }
}

function renderDrugListLocal(q, el) {
  const list = DRUGS.filter(d =>
    d.name.toLowerCase().includes(q.toLowerCase()) ||
    d.ingredient.toLowerCase().includes(q.toLowerCase()) ||
    d.code.toLowerCase().includes(q.toLowerCase())
  );
  if (!list.length) { el.innerHTML = '<div class="empty-text">검색 결과가 없습니다</div>'; return; }
  el.innerHTML = list.map(d => `
    <div class="result-item" onclick="showDrug(${d.id})">
      <div class="result-name">${d.name}</div>
      <div class="result-sub">${d.ingredient} · ${d.company}</div>
      <div class="result-badges">
        <span class="badge badge-green">${d.insurance}</span>
        <span class="badge badge-blue">${d.type}</span>
        <span class="badge badge-gray">${d.form}</span>
      </div>
      <div class="drug-efcy">📌 ${d.efcy}</div>
      <div class="drug-efcy">💊 ${d.useMethod}</div>
      <span class="badge badge-gray" style="font-size:0.7rem;margin-top:4px;">📦 샘플</span>
    </div>`).join('');
}

/* ===== AI 요약 (Claude API) ===== */
async function fetchAISummary(name, ingr, company, efcy, useMethod) {
  try {
    const prompt = `당신은 제약 영업사원(MR) 전문 AI입니다.
다음 약품 정보를 바탕으로 아래 두 가지를 한국어로 작성해주세요.

약품명: ${name}
성분: ${ingr}
제조사: ${company}
적응증: ${efcy ? efcy.substring(0,200) : '정보없음'}
용법: ${useMethod ? useMethod.substring(0,150) : '정보없음'}

[AI_SUMMARY]
계열, 작용기전, 핵심 적응증을 3~4문장으로 간결하게 요약. MR이 30초 안에 이해할 수 있도록.

[MR_POINTS]
면담 시 의사에게 강조할 포인트 3가지를 번호 목록으로. 각 1~2문장. 경쟁약 대비 차별점, 처방 확장 포인트, 임상/약가 강점 중심으로.

반드시 [AI_SUMMARY]와 [MR_POINTS] 태그를 포함해서 응답하세요.`;

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'anthropic-version': '2023-06-01', 'x-api-key': '' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 600,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await res.json();
    const text = data.content?.[0]?.text || '';

    const summaryMatch = text.match(/\[AI_SUMMARY\]([\s\S]*?)(?=\[MR_POINTS\]|$)/);
    const mrMatch = text.match(/\[MR_POINTS\]([\s\S]*?)$/);

    const summary = summaryMatch ? summaryMatch[1].trim() : text.substring(0, 200);
    const mrRaw = mrMatch ? mrMatch[1].trim() : '';

    // AI 요약 렌더
    const aiBody = document.getElementById('aiSummaryBody');
    if (aiBody) {
      aiBody.classList.remove('loading-dot');
      aiBody.textContent = summary;
      aiBody.previousElementSibling.querySelector('span').textContent = '';
    }

    // MR 포인트 렌더
    const mrBody = document.getElementById('mrPointBody');
    if (mrBody && mrRaw) {
      mrBody.classList.remove('loading-dot');
      const points = mrRaw.split(/\n?\d+\.\s+/).filter(p => p.trim());
      mrBody.innerHTML = points.map((p, i) => `
        <div class="mr-point">
          <div class="mr-num">${i+1}</div>
          <div>${p.trim()}</div>
        </div>`).join('');
      mrBody.previousElementSibling?.querySelector?.('span') && (mrBody.previousElementSibling.querySelector('span').textContent = '');
    }
  } catch(e) {
    const aiBody = document.getElementById('aiSummaryBody');
    if (aiBody) { aiBody.classList.remove('loading-dot'); aiBody.textContent = 'AI 요약을 불러올 수 없습니다.'; }
    const mrBody = document.getElementById('mrPointBody');
    if (mrBody) { mrBody.classList.remove('loading-dot'); mrBody.textContent = 'MR 포인트를 불러올 수 없습니다.'; }
  }
}

/* ===== 차트 ===== */
function drawChart(drugId) {
  const data = TREND_DATA[drugId];
  if (!data) return '';
  const vals = data[currentRegion];
  const max = Math.max(...vals);

  const bars = data.years.map((y, i) => {
    const pct = Math.round((vals[i] / max) * 100);
    const isLast = i === data.years.length - 1;
    return `
      <div style="display:flex;flex-direction:column;align-items:center;flex:1;gap:4px;">
        <div style="font-size:0.7rem;font-weight:700;color:var(--green2);">${vals[i]}</div>
        <div style="width:100%;background:rgba(0,0,0,0.06);border-radius:8px;height:80px;display:flex;align-items:flex-end;overflow:hidden;">
          <div style="width:100%;height:${pct}%;background:${isLast?'var(--green)':'rgba(0,192,127,0.35)'};border-radius:6px 6px 0 0;"></div>
        </div>
        <div style="font-size:0.7rem;color:var(--sub);">${y}</div>
      </div>`;
  }).join('');

  return `
    <div class="detail-section">
      <div class="section-title" style="display:flex;justify-content:space-between;align-items:center;">
        <span>처방 추이 (만건)</span>
        <div style="display:flex;gap:4px;">
          ${['전국','대구','서울'].map(r => `
            <button onclick="currentRegion='${r}';showDrug(${drugId})"
              style="padding:3px 9px;border-radius:999px;border:none;cursor:pointer;font-size:0.72rem;font-weight:700;background:${currentRegion===r?'var(--green)':'rgba(0,0,0,0.07)'};color:${currentRegion===r?'#fff':'var(--sub)'};">
              ${r}
            </button>`).join('')}
        </div>
      </div>
      <div class="info-card" style="padding:14px 10px 10px;">
        <div style="display:flex;gap:6px;align-items:flex-end;">${bars}</div>
      </div>
    </div>`;
}

function searchICD() {
  const q = document.getElementById('icdSearch').value.trim().toLowerCase();

  if (!q) { el.innerHTML = '<div class="empty-text">질환명 또는 코드를 입력해주세요</div>'; return; }
  const results = ICD_DB.filter(i => i.code.toLowerCase().includes(q) || i.name.toLowerCase().includes(q));
  if (!results.length) { el.innerHTML = '<div class="empty-text">검색 결과가 없습니다</div>'; return; }
  el.innerHTML = results.map(i => {
    const drugs = DRUGS.filter(d => i.drugs.includes(d.id));
    return `
      <div class="result-item">
        <div style="display:flex;align-items:center;gap:10px;">
          <span class="badge badge-blue" style="font-size:0.9rem;">${i.code}</span>
          <span style="font-weight:700;">${i.name}</span>

          ${drugs.length ? drugs.map(d=>`<span class="badge badge-green" style="cursor:pointer;" onclick="showDrug(${d.id})">${d.name}</span>`).join('') : '<span class="badge badge-gray">관련 약품 없음</span>'}
        </div>
      </div>`;
  }).join('');
}

/* ===== 경쟁품 비교 ===== */
function searchComp() {
  const q = document.getElementById('compSearch').value.trim().toLowerCase();
  const el = document.getElementById('compResults');
  if (!q) { el.innerHTML = '<div class="empty-text">성분명 또는 약품명을 입력해주세요</div>'; return; }

  clearTimeout(searchTimer);
  searchTimer = setTimeout(async () => {
    el.innerHTML = '<div class="empty-text loading-dot">검색 중... ⏳</div>';

    // API에서 먼저 검색
    try {
      const res = await fetch(`https://drug-ede5bi7c3q-du.a.run.app?name=${encodeURIComponent(q)}`);
      const data = await res.json();
      const items = data.items || [];

      if (items.length > 0) {
        _apiResults = items;
        // 첫번째 결과 기준으로 동일성분 그룹핑
        const base = items[0];
        const baseIngr = (base.INGR_NAME_KOR || base.ingrNameKor || '').split('(')[0].split('/')[0].trim().toLowerCase().substring(0,6);
        const sameIngr = items.filter((it, i) => {
          if (i === 0) return false;
          const itIngr = (it.INGR_NAME_KOR || it.ingrNameKor || '').toLowerCase();
          return itIngr.includes(baseIngr);
        });
        const others = items.filter((it, i) => i > 0 && !sameIngr.includes(it));

        el.innerHTML = `
          <div style="padding:8px 0 6px;font-size:0.8rem;font-weight:700;color:var(--sub);">기준 약품 <span class="badge badge-green" style="margin-left:4px;">🌐 실시간</span></div>
          <div class="comp-card" style="border:1px solid rgba(0,192,127,0.2);" onclick="showDrugAPI(0)" >
            <div>
              <div class="comp-name">${base.ITEM_NAME || base.itemName}</div>
              <div class="comp-co">${base.INGR_NAME_KOR || base.ingrNameKor || ''} · ${base.ENTP_NAME || base.entpName || ''}</div>
            </div>
            <span class="badge badge-gray">${base.FORM_CODE_NAME || base.formCodeName || ''}</span>
          </div>

          ${sameIngr.length ? `
            <div style="padding:10px 0 6px;font-size:0.8rem;font-weight:700;color:var(--sub);">동일 성분 (${sameIngr.length}건)</div>
            ${sameIngr.slice(0,5).map(c => {
              const ci = items.indexOf(c);
              return `<div class="comp-card" onclick="showDrugAPI(${ci})" style="cursor:pointer;">
                <div>
                  <div class="comp-name">${c.ITEM_NAME || c.itemName}</div>
                  <div class="comp-co">${c.INGR_NAME_KOR || c.ingrNameKor || ''} · ${c.ENTP_NAME || c.entpName || ''}</div>
                </div>
                <span class="badge badge-gray">${c.FORM_CODE_NAME || c.formCodeName || ''}</span>
              </div>`;
            }).join('')}
          ` : ''}

          ${others.length ? `
            <div style="padding:10px 0 6px;font-size:0.8rem;font-weight:700;color:var(--sub);">기타 검색 결과</div>
            ${others.slice(0,3).map(c => {
              const ci = items.indexOf(c);
              return `<div class="comp-card" onclick="showDrugAPI(${ci})" style="cursor:pointer;">
                <div>
                  <div class="comp-name">${c.ITEM_NAME || c.itemName}</div>
                  <div class="comp-co">${c.INGR_NAME_KOR || c.ingrNameKor || ''} · ${c.ENTP_NAME || c.entpName || ''}</div>
                </div>
                <span class="badge badge-gray">${c.FORM_CODE_NAME || c.formCodeName || ''}</span>
              </div>`;
            }).join('')}
          ` : ''}
        `;
        return;
      }
    } catch(e) {}

    // fallback: 샘플 데이터
    const base = DRUGS.find(d => d.name.toLowerCase().includes(q) || d.ingredient.toLowerCase().includes(q) || d.type.toLowerCase().includes(q));
    if (!base) { el.innerHTML = '<div class="empty-text">검색 결과가 없습니다</div>'; return; }
    const sameIngredient = DRUGS.filter(d => d.ingredient === base.ingredient && d.id !== base.id);
    const sameType = DRUGS.filter(d => d.type === base.type && d.ingredient !== base.ingredient);
    el.innerHTML = `
      <div style="padding:8px 0 6px;font-size:0.8rem;font-weight:700;color:var(--sub);">기준 약품 <span class="badge badge-gray" style="margin-left:4px;">📦 샘플</span></div>
      <div class="comp-card" style="border:1px solid rgba(0,192,127,0.2);">
        <div><div class="comp-name">${base.name}</div><div class="comp-co">${base.ingredient} · ${base.company}</div></div>
        <div class="comp-price">${base.price}원</div>
      </div>
      ${sameIngredient.length ? `
        <div style="padding:10px 0 6px;font-size:0.8rem;font-weight:700;color:var(--sub);">동일 성분</div>
        ${sameIngredient.map(d=>`<div class="comp-card" onclick="showDrug(${d.id})" style="cursor:pointer;"><div><div class="comp-name">${d.name}</div><div class="comp-co">${d.ingredient} · ${d.company}</div></div><div class="comp-price">${d.price}원</div></div>`).join('')}` : ''}
      ${sameType.length ? `
        <div style="padding:10px 0 6px;font-size:0.8rem;font-weight:700;color:var(--sub);">동일 계열 (${base.type})</div>
        ${sameType.map(d=>`<div class="comp-card" onclick="showDrug(${d.id})" style="cursor:pointer;"><div><div class="comp-name">${d.name}</div><div class="comp-co">${d.ingredient} · ${d.company}</div></div><div class="comp-price">${d.price}원</div></div>`).join('')}` : ''}
    `;
  }, 350);
}
