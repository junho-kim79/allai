<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<meta http-equiv="Content-Security-Policy" content="
default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;
script-src * 'unsafe-inline' 'unsafe-eval';
style-src * 'unsafe-inline';
img-src * data: blob:;
connect-src *;
">

<title>Allai - 제약 영업 실무 도구</title>

<style>

:root{
--green:#00C07F;
--green2:#00A36C;
--text:#111;
--sub:#6E6E73;
--bg:#F4FAF7;
--card:rgba(255,255,255,0.88);
--line:rgba(255,255,255,0.7);
--shadow:0 18px 50px rgba(0,80,50,0.08);
--red:#ef4444;
--yellow:#f59e0b;
--blue:#3b82f6;
}

*{box-sizing:border-box}

body{
margin:0;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:16px;
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
background:
radial-gradient(circle at top left,rgba(0,192,127,0.10),transparent 40%),
linear-gradient(180deg,#F0FAF5 0%,#E4F5EC 100%);
color:var(--text);
}

.phone-shell{
width:100%;
max-width:430px;
background:rgba(255,255,255,0.62);
backdrop-filter:blur(24px);
border:1px solid rgba(255,255,255,0.75);
border-radius:38px;
box-shadow:var(--shadow);
padding:16px;
overflow:hidden;
}

.view-container{
background:linear-gradient(180deg,rgba(255,255,255,0.92),rgba(255,255,255,0.82));
border:1px solid var(--line);
border-radius:30px;
min-height:760px;
padding:24px 18px 20px;
position:relative;
}

.dev-credit{
position:absolute;
bottom:14px;
right:18px;
font-size:.72rem;
color:rgba(110,110,115,.45)
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:18px;
}

.brand{
font-size:.95rem;
font-weight:800;
letter-spacing:-.02em;
}

.brand span{color:var(--green)}

.beta-badge{
padding:3px 8px;
border-radius:999px;
background:rgba(0,192,127,.12);
color:var(--green2);
font-size:.68rem;
font-weight:800;
border:1px solid rgba(0,192,127,.2);
margin-left:6px;
}

.step-chip{
padding:6px 12px;
border-radius:999px;
background:rgba(0,192,127,.10);
color:var(--green2);
font-size:.78rem;
font-weight:700;
}

.screen{display:none}
.screen.active{display:block}

.hero{margin:20px 0 24px}

.card-list{
display:grid;
gap:14px;
margin:22px 0;
}

.choice-card{
padding:18px 16px;
background:var(--card);
border-radius:22px;
cursor:pointer;
transition:.2s;
}

.choice-card:hover{
transform:translateY(-2px);
box-shadow:0 14px 32px rgba(0,192,127,.14);
}

.choice-top{
display:flex;
justify-content:space-between;
align-items:center;
}

.icon-badge{
width:44px;
height:44px;
border-radius:14px;
display:flex;
align-items:center;
justify-content:center;
background:rgba(0,192,127,.12);
font-size:1.3rem;
}

.search-wrap{position:relative;margin-bottom:14px}

.search-input{
width:100%;
padding:16px 50px 16px 18px;
border-radius:20px;
border:1px solid rgba(17,17,17,.08);
font-size:1rem;
}

.search-btn{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
background:var(--green);
color:#fff;
border:none;
border-radius:12px;
padding:8px 14px;
font-size:.85rem;
font-weight:700;
cursor:pointer;
}

.result-list{
display:grid;
gap:10px;
margin-top:12px;
max-height:440px;
overflow-y:auto;
}

.result-item{
padding:14px 16px;
background:var(--card);
border-radius:18px;
cursor:pointer;
}

.result-name{
font-size:1rem;
font-weight:700;
}

.result-sub{
font-size:.82rem;
color:var(--sub);
margin-top:3px;
}

.badge{
display:inline-block;
padding:4px 10px;
border-radius:999px;
font-size:.74rem;
font-weight:700;
}

.badge-green{background:rgba(0,192,127,.12);color:var(--green2)}
.badge-red{background:rgba(239,68,68,.12);color:#b91c1c}
.badge-yellow{background:rgba(245,158,11,.12);color:#92400e}
.badge-blue{background:rgba(59,130,246,.12);color:#1d4ed8}
.badge-gray{background:rgba(110,110,115,.10);color:var(--sub)}

.btn-back{
background:none;
border:none;
color:var(--sub);
font-size:.88rem;
cursor:pointer;
margin-bottom:18px;
}

.empty-text{
padding:20px;
text-align:center;
color:var(--sub);
font-size:.9rem;
}

</style>
</head>

<body>

<div class="phone-shell">
<div class="view-container">

<div class="dev-credit">dev. junho.kim</div>

<div class="topbar">
<div class="brand">All<span>ai</span><span class="beta-badge">BETA</span></div>
<div class="step-chip" id="stepChip">홈</div>
</div>

<div class="screen active" id="screen1">

<div class="hero">

<img src="https://images.unsplash.com/photo-1581092580497-e0d23cbdf1dc"
style="width:100%;height:180px;object-fit:cover;border-radius:20px;opacity:.55">

<h1 style="color:#fff;margin-top:-140px;padding-left:14px;">면담<br>1분 전</h1>

</div>

<div class="card-list">

<button class="choice-card" onclick="goScreen('screen2','약품 검색')">
<div class="choice-top">
<div>
<h3>💊 약품 검색</h3>
<p>제품명 · 성분명 · 보험코드</p>
</div>
<div class="icon-badge">🔍</div>
</div>
</button>

</div>

</div>

<div class="screen" id="screen2">

<button class="btn-back" onclick="goScreen('screen1','홈')">← 홈</button>

<div class="search-wrap">
<input class="search-input" id="drugSearch" placeholder="예) 케이캡">
<button class="search-btn" onclick="searchDrug()">검색</button>
</div>

<div id="drugResults" class="result-list"></div>

</div>

</div>
</div>

<script>

function goScreen(id,label){

document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'))

document.getElementById(id).classList.add('active')

document.getElementById('stepChip').textContent=label

}

async function searchDrug(){

const q=document.getElementById('drugSearch').value

const res=await fetch('/api/drug?name='+encodeURIComponent(q))

const data=await res.json()

const items=data.items||[]

const el=document.getElementById('drugResults')

if(!items.length){

el.innerHTML='<div class="empty-text">검색 결과 없음</div>'

return

}

el.innerHTML=items.map(i=>`

<div class="result-item">

<div class="result-name">${i.ITEM_NAME||i.itemName}</div>

<div class="result-sub">${i.ENTP_NAME||i.entpName}</div>

</div>

`).join('')

}

</script>

</body>
</html>
