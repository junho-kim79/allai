<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="
    default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;
    script-src * 'unsafe-inline' 'unsafe-eval';
    style-src * 'unsafe-inline';
    img-src * data: blob:;
    connect-src *;
  ">
  <title>Allai - 제약 영업 실무 도구</title>

  <style>
    :root {
      --green: #00C07F;
      --green2: #00A36C;
      --text: #111111;
      --sub: #6E6E73;
      --card: rgba(255,255,255,0.9);
      --line: rgba(255,255,255,0.78);
      --shadow: 0 18px 50px rgba(0,80,50,0.08);
      --red: #ef4444;
      --yellow: #f59e0b;
      --blue: #3b82f6;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Segoe UI', sans-serif;
      background:
        radial-gradient(circle at top left, rgba(0,192,127,0.10), transparent 40%),
        linear-gradient(180deg, #F0FAF5 0%, #E4F5EC 100%);
      color: var(--text);
    }

    .phone-shell {
      width: 100%;
      max-width: 430px;
      background: rgba(255,255,255,0.62);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.75);
      border-radius: 38px;
      box-shadow: var(--shadow);
      padding: 16px;
      overflow: hidden;
    }

    .view-container {
      position: relative;
      min-height: 760px;
      padding: 24px 18px 20px;
      border-radius: 30px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,0.92), rgba(255,255,255,0.82));
    }

    .dev-credit {
      position: absolute;
      bottom: 14px;
      right: 18px;
      font-size: 0.72rem;
      color: rgba(110,110,115,0.45);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }

    .brand {
      font-size: 0.95rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .brand span { color: var(--green); }

    .beta-badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(0,192,127,0.12);
      color: var(--green2);
      font-size: 0.68rem;
      font-weight: 800;
      border: 1px solid rgba(0,192,127,0.2);
      margin-left: 6px;
    }

    .step-chip {
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(0,192,127,0.10);
      color: var(--green2);
      font-size: 0.78rem;
      font-weight: 700;
    }

    .screen { display: none; animation: fadeUp 0.28s ease; }
    .screen.active { display: block; }

    .hero {
      margin: 0 0 20px;
      text-align: left;
      position: relative;
      border-radius: 22px;
      overflow: hidden;
      min-height: 180px;
      background: #111;
    }

    .hero img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      object-position: center 20%;
      opacity: 0.55;
      display: block;
      border-radius: 22px;
    }

    .hero-overlay {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 18px 18px 16px;
      background: linear-gradient(transparent, rgba(0,0,0,0.7));
    }

    .hero h1 {
      margin: 0 0 4px;
      font-size: 1.7rem;
      color: #fff;
      letter-spacing: -0.04em;
      line-height: 1.15;
      font-weight: 800;
    }

    .hero p {
      margin: 0;
      color: rgba(255,255,255,0.75);
      font-size: 0.84rem;
    }

    .hero-title {
      margin: 0 0 8px;
      font-size: 1.52rem;
      line-height: 1.2;
      letter-spacing: -0.04em;
      font-weight: 800;
    }

    .subtext {
      margin: 0;
      color: var(--sub);
      font-size: 0.92rem;
      line-height: 1.5;
    }

    .card-list {
      display: grid;
      gap: 14px;
      margin: 22px 0;
    }

    .choice-card {
      text-align: left;
      padding: 18px 16px;
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.9);
      border-radius: 22px;
      box-shadow: 0 8px 24px rgba(0,80,50,0.04);
      cursor: pointer;
      transition: all 0.2s ease;
      width: 100%;
    }

    .choice-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 32px rgba(0,192,127,0.14);
    }

    .choice-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
    }

    .choice-card h3 {
      margin: 0;
      font-size: 1.05rem;
      letter-spacing: -0.02em;
      font-weight: 700;
    }

    .choice-card p {
      margin: 6px 0 0;
      font-size: 0.88rem;
      color: var(--sub);
      line-height: 1.45;
    }

    .icon-badge {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,192,127,0.12);
      font-size: 1.3rem;
      flex-shrink: 0;
    }

    .search-wrap {
      position: relative;
      margin-bottom: 14px;
    }

    .search-input {
      width: 100%;
      padding: 16px 92px 16px 18px;
      border-radius: 20px;
      border: 1px solid rgba(17,17,17,0.08);
      background: rgba(255,255,255,0.96);
      font-size: 1rem;
      outline: none;
      transition: all 0.2s;
    }

    .search-input:focus {
      border-color: rgba(0,192,127,0.5);
      box-shadow: 0 0 0 4px rgba(0,192,127,0.10);
    }

    .search-btn {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 8px 14px;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
    }

    .result-list {
      display: grid;
      gap: 10px;
      margin-top: 12px;
      max-height: 440px;
      overflow-y: auto;
    }

    .result-item {
      padding: 14px 16px;
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.9);
      border-radius: 18px;
      cursor: pointer;
      transition: all 0.18s;
    }

    .result-item:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(0,192,127,0.10);
    }

    .result-name {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .result-sub {
      font-size: 0.82rem;
      color: var(--sub);
      margin-top: 3px;
    }

    .result-badges {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.74rem;
      font-weight: 700;
    }

    .badge-green { background: rgba(0,192,127,0.12); color: var(--green2); }
    .badge-red { background: rgba(239,68,68,0.12); color: #b91c1c; }
    .badge-yellow { background: rgba(245,158,11,0.12); color: #92400e; }
    .badge-blue { background: rgba(59,130,246,0.12); color: #1d4ed8; }
    .badge-gray { background: rgba(110,110,115,0.10); color: var(--sub); }

    .detail-section { margin-bottom: 18px; }

    .section-title {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--sub);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .info-card {
      padding: 16px;
      background: rgba(255,255,255,0.92);
      border: 1px solid rgba(255,255,255,0.95);
      border-radius: 20px;
      box-shadow: 0 4px 16px rgba(0,80,50,0.04);
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 9px 0;
      border-bottom: 1px solid rgba(0,0,0,0.05);
      font-size: 0.9rem;
    }

    .info-row:last-child { border-bottom: none; }

    .info-label { color: var(--sub); font-size: 0.85rem; }
    .info-value {
      font-weight: 700;
      letter-spacing: -0.01em;
      text-align: right;
      word-break: break-word;
    }

    .risk-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-radius: 18px;
      margin-bottom: 10px;
    }

    .risk-low { background: rgba(0,192,127,0.08); border: 1px solid rgba(0,192,127,0.15); }
    .risk-mid { background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.15); }
    .risk-high { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.15); }

    .risk-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .risk-dot-low { background: var(--green); }
    .risk-dot-mid { background: var(--yellow); }
    .risk-dot-high { background: var(--red); }

    .risk-text {
      font-size: 0.85rem;
      line-height: 1.45;
      flex: 1;
    }

    .icd-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: 14px;
      background: rgba(59,130,246,0.08);
      border: 1px solid rgba(59,130,246,0.12);
      margin: 4px;
      font-size: 0.84rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .icd-chip:hover { background: rgba(59,130,246,0.15); }

    .icd-code {
      font-weight: 800;
      color: #1d4ed8;
    }

    .icd-name {
      color: var(--sub);
      font-size: 0.8rem;
    }

    .comp-card {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 13px 16px;
      background: rgba(255,255,255,0.92);
      border: 1px solid rgba(255,255,255,0.95);
      border-radius: 16px;
      margin-bottom: 8px;
    }

    .comp-name { font-weight: 700; font-size: 0.95rem; }
    .comp-co { font-size: 0.8rem; color: var(--sub); margin-top: 2px; }
    .comp-price { font-weight: 800; color: var(--green2); font-size: 0.95rem; }

    .btn-back {
      background: none;
      border: none;
      color: var(--sub);
      font-size: 0.88rem;
      cursor: pointer;
      padding: 0;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .empty-text {
      padding: 20px;
      text-align: center;
      color: var(--sub);
      font-size: 0.9rem;
    }

    .tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .tab-btn {
      padding: 7px 14px;
      border-radius: 999px;
      background: rgba(0,0,0,0.05);
      border: none;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      color: var(--sub);
      transition: all 0.15s;
    }

    .tab-btn.active {
      background: var(--green);
      color: #fff;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>
<div class="phone-shell">
  <div class="view-container">
    <div class="dev-credit">dev. junho.kim</div>

    <div class="topbar">
      <div class="brand">All<span>ai</span><span class="beta-badge">BETA</span></div>
      <div class="step-chip" id="stepChip">홈</div>
    </div>

    <!-- 화면 1: 메인 -->
    <div class="screen active" id="screen1">
      <div class="hero">
        <img src="/sales.jpg" alt="영업사원" />
        <div class="hero-overlay">
          <h1>면담<br>1분 전</h1>
          <p id="heroMsg"></p>
        </div>
      </div>

      <div class="card-list">
        <button class="choice-card" onclick="goScreen('screen2', '약품 검색')">
          <div class="choice-top">
            <div><h3>💊 약품 검색</h3><p>제품명 · 성분명 · 보험코드로 검색</p></div>
            <div class="icon-badge">🔍</div>
          </div>
        </button>

        <button class="choice-card" onclick="goScreen('screen_icd', '상병코드')">
          <div class="choice-top">
            <div><h3>🏥 상병코드 조회</h3><p>질환명 또는 코드로 관련 약품 확인</p></div>
            <div class="icon-badge">📋</div>
          </div>
        </button>

        <button class="choice-card" onclick="goScreen('screen_comp', '경쟁품 비교')">
          <div class="choice-top">
            <div><h3>⚔️ 경쟁품 비교</h3><p>성분·계열별 경쟁제품 한눈에 비교</p></div>
            <div class="icon-badge">📊</div>
          </div>
        </button>

        <button class="choice-card" onclick="goScreen('screen_cut', '삭감 조회')">
          <div class="choice-top">
            <div><h3>⚠️ 삭감 위험 조회</h3><p>처방 시 삭감 가능성 미리 확인</p></div>
            <div class="icon-badge">🛡️</div>
          </div>
        </button>

        <button class="choice-card" onclick="goScreen('screen_stat', '처방 통계')">
          <div class="choice-top">
            <div><h3>📈 처방 통계 추이</h3><p>지역별 · 성분별 · 품목별 처방 그래프</p></div>
            <div class="icon-badge">📉</div>
          </div>
        </button>
      </div>
    </div>

    <!-- 화면 2: 약품 검색 -->
    <div class="screen" id="screen2">
      <button class="btn-back" onclick="goScreen('screen1','홈')">← 홈</button>
      <div class="hero-title">약품 검색</div>
      <p class="subtext">제품명, 성분명, 보험코드 입력</p>

      <div class="search-wrap">
        <input class="search-input" id="drugSearch" placeholder="예) 라베프라졸, 케이캡, 215700ATB" oninput="searchDrug()" />
        <button class="search-btn" onclick="searchDrug()">검색</button>
      </div>

      <div class="tabs">
        <button class="tab-btn active" onclick="setSearchType('all',this)">전체</button>
        <button class="tab-btn" onclick="setSearchType('product',this)">제품명</button>
        <button class="tab-btn" onclick="setSearchType('ingredient',this)">성분명</button>
        <button class="tab-btn" onclick="setSearchType('code',this)">보험코드</button>
      </div>

      <div id="drugResults" class="result-list">
        <div class="empty-text">약품명을 입력해주세요</div>
      </div>
    </div>

    <!-- 화면 3: 약품 상세 -->
    <div class="screen" id="screen3">
      <button class="btn-back" onclick="goScreen('screen2','약품 검색')">← 검색</button>
      <div id="drugDetail"></div>
    </div>

    <!-- 화면: 상병코드 조회 -->
    <div class="screen" id="screen_icd">
      <button class="btn-back" onclick="goScreen('screen1','홈')">← 홈</button>
      <div class="hero-title">상병코드 조회</div>
      <p class="subtext">질환명 또는 ICD코드로 검색</p>

      <div class="search-wrap">
        <input class="search-input" id="icdSearch" placeholder="예) 위식도역류, K21, 당뇨" oninput="searchICD()" />
        <button class="search-btn" onclick="searchICD()">검색</button>
      </div>

      <div id="icdResults" class="result-list">
        <div class="empty-text">질환명 또는 코드를 입력해주세요</div>
      </div>
    </div>

    <!-- 화면: 경쟁품 비교 -->
    <div class="screen" id="screen_comp">
      <button class="btn-back" onclick="goScreen('screen1','홈')">← 홈</button>
      <div class="hero-title">경쟁품 비교</div>
      <p class="subtext">성분·계열로 경쟁제품 비교</p>

      <div class="search-wrap">
        <input class="search-input" id="compSearch" placeholder="예) 라베프라졸, PPI, 케이캡" oninput="searchComp()" />
        <button class="search-btn" onclick="searchComp()">검색</button>
      </div>

      <div id="compResults" class="result-list">
        <div class="empty-text">성분명 또는 약품명을 입력해주세요</div>
      </div>
    </div>

    <!-- 화면: 삭감 조회 -->
    <div class="screen" id="screen_cut">
      <button class="btn-back" onclick="goScreen('screen1','홈')">← 홈</button>
      <div class="hero-title">삭감 위험 조회</div>
      <p class="subtext">처방 전 삭감 가능성 확인</p>

      <div class="search-wrap">
        <input class="search-input" id="cutSearch" placeholder="예) 라베프라졸, 케이캡" oninput="searchCut()" />
        <button class="search-btn" onclick="searchCut()">검색</button>
      </div>

      <div id="cutResults" class="result-list">
        <div class="empty-text">약품명을 입력해주세요</div>
      </div>
    </div>

    <!-- 화면: 처방 통계 -->
    <div class="screen" id="screen_stat">
      <button class="btn-back" onclick="goScreen('screen1','홈')">← 홈</button>
      <div class="hero-title">처방 통계 추이</div>
      <p class="subtext">지역별 · 성분별 · 품목별 비교</p>

      <div class="tabs" id="statTypeTabs">
        <button class="tab-btn active" onclick="setStatType('region',this)">지역별</button>
        <button class="tab-btn" onclick="setStatType('ingredient',this)">성분별</button>
        <button class="tab-btn" onclick="setStatType('product',this)">품목별</button>
      </div>

      <div id="statContent"></div>
    </div>
  </div>
</div>

  el.innerHTML = list.map(d => `

      <div class="result-name">${d.name}</div>
      <div class="result-sub">${d.ingredient} · ${d.company}</div>

function searchDrug() {
  const q = document.getElementById('drugSearch').value.trim();
  const el = document.getElementById('drugResults');

  if (!q) {
    el.innerHTML = '<div class="empty-text">약품명을 입력해주세요</div>';
    return;
  }

  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => fetchDrug(q), 350);
}

async function fetchDrug(q) {
  const el = document.getElementById('drugResults');
  el.innerHTML = '<div class="empty-text">검색 중... ⏳</div>';

  try {
    const res = await fetch(`https://drug-ede5bi7c3q-du.a.run.app?name=${encodeURIComponent(q)}`);
    const data = await res.json();
    const items = data.items || [];

    if (!items.length) {
      const fallback = DRUGS.filter(d =>
        d.name.toLowerCase().includes(q.toLowerCase()) ||
        d.ingredient.toLowerCase().includes(q.toLowerCase()) ||
        d.code.toLowerCase().includes(q.toLowerCase())
      );
      renderDrugList(fallback, el);
      return;
    }

    window._apiResults = items;

    el.innerHTML = items.map((item, i) => `
      <div class="result-item" onclick="showDrugAPI(${i})">
        <div class="result-name">${item.ITEM_NAME || item.itemName || '-'}</div>
        <div class="result-sub">${item.INGR_NAME_KOR || item.ingrNameKor || ''} · ${item.ENTP_NAME || item.entpName || ''}</div>
        <div class="result-badges">
          <span class="badge badge-green">실시간</span>
          <span class="badge badge-gray">${item.FORM_CODE_NAME || item.formCodeName || '-'}</span>
        </div>
        <div style="margin-top:8px;padding-top:8px;border-top:1px solid rgba(0,0,0,0.05);">
          <span style="font-size:0.74rem;color:var(--sub);font-weight:600;">허가일</span>
          <span style="font-size:0.78rem;font-weight:700;margin-left:8px;">${item.ITEM_PERMIT_DATE || item.itemPermitDate || '-'}</span>
        </div>
      </div>
    `).join('');
  } catch (e) {
    const fallback = DRUGS.filter(d =>
      d.name.toLowerCase().includes(q.toLowerCase()) ||
      d.ingredient.toLowerCase().includes(q.toLowerCase()) ||
      d.code.toLowerCase().includes(q.toLowerCase())
    );
    renderDrugList(fallback, el);
  }
}

function drawChart(drugId) {
  const data = TREND_DATA[drugId];
  if (!data) return '';
  const vals = data[currentRegion];
  const max = Math.max(...vals);

  const bars = data.years.map((y, i) => {
    const pct = Math.round((vals[i] / max) * 100);
    const isLast = i === data.years.length - 1;
    return `
      <div style="display:flex;flex-direction:column;align-items:center;flex:1;gap:4px;">
        <div style="font-size:0.7rem;font-weight:700;color:var(--green2);">${vals[i]}</div>
        <div style="width:100%;background:rgba(0,0,0,0.06);border-radius:8px;height:80px;display:flex;align-items:flex-end;overflow:hidden;">
          <div style="width:100%;height:${pct}%;background:${isLast ? 'var(--green)' : 'rgba(0,192,127,0.35)'};border-radius:6px 6px 0 0;"></div>
        </div>
        <div style="font-size:0.7rem;color:var(--sub);">${y}</div>
      </div>
    `;
  }).join('');

  return `
    <div class="detail-section">
      <div class="section-title" style="display:flex;justify-content:space-between;align-items:center;">
        <span>처방 추이 (만건)</span>

        <div style="display:flex;gap:6px;align-items:flex-end;">

}

        </div>
        <div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:6px;">
          ${drugs.length ? drugs.map(d => `<span class="badge badge-green" style="cursor:pointer;" onclick="showDrug(${d.id})">${d.name}</span>`).join('') : '<span class="badge badge-gray">관련 약품 없음</span>'}
        </div>
      </div>
    `;
  }).join('');
}

function searchComp() {
  const q = document.getElementById('compSearch').value.trim().toLowerCase();
  const el = document.getElementById('compResults');

  if (!q) {
    el.innerHTML = '<div class="empty-text">성분명 또는 약품명을 입력해주세요</div>';
    return;
  }

  const base = DRUGS.find(d =>
    d.name.toLowerCase().includes(q) ||
    d.ingredient.toLowerCase().includes(q) ||
    d.type.toLowerCase().includes(q)
  );

  if (!base) {
    el.innerHTML = '<div class="empty-text">검색 결과가 없습니다</div>';
    return;
  }

  const sameIngredient = DRUGS.filter(d => d.ingredient === base.ingredient && d.id !== base.id);
  const sameType = DRUGS.filter(d => d.type === base.type && d.ingredient !== base.ingredient);

  el.innerHTML = `
    <div style="padding:12px 0 6px;font-size:0.8rem;font-weight:700;color:var(--sub);">기준 약품</div>
    <div class="comp-card" style="border:1px solid rgba(0,192,127,0.2);">
      <div><div class="comp-name">${base.name}</div><div class="comp-co">${base.ingredient} · ${base.company}</div></div>
      <div class="comp-price">${base.price}원</div>
    </div>

    ${sameIngredient.length ? `
      <div style="padding:12px 0 6px;font-size:0.8rem;font-weight:700;color:var(--sub);">동일 성분</div>
      ${sameIngredient.map(d => `
        <div class="comp-card" onclick="showDrug(${d.id})" style="cursor:pointer;">
          <div><div class="comp-name">${d.name}</div><div class="comp-co">${d.ingredient} · ${d.company}</div></div>
          <div class="comp-price">${d.price}원</div>
        </div>
      `).join('')}
    ` : ''}

    ${sameType.length ? `
      <div style="padding:12px 0 6px;font-size:0.8rem;font-weight:700;color:var(--sub);">동일 계열 (${base.type})</div>
      ${sameType.map(d => `
        <div class="comp-card" onclick="showDrug(${d.id})" style="cursor:pointer;">
          <div><div class="comp-name">${d.name}</div><div class="comp-co">${d.ingredient} · ${d.company}</div></div>
          <div class="comp-price">${d.price}원</div>
        </div>
      `).join('')}
    ` : ''}
  `;
}

function searchCut() {
  const q = document.getElementById('cutSearch').value.trim().toLowerCase();
  const el = document.getElementById('cutResults');

  if (!q) {
    el.innerHTML = '<div class="empty-text">약품명을 입력해주세요</div>';
    return;
  }

  const results = DRUGS.filter(d =>
    d.name.toLowerCase().includes(q) ||
    d.ingredient.toLowerCase().includes(q)
  );

  if (!results.length) {
    el.innerHTML = '<div class="empty-text">검색 결과가 없습니다</div>';
    return;
  }

  el.innerHTML = results.map(d => `
    <div class="result-item">
      <div class="result-name">${d.name}</div>
      <div class="result-sub">${d.ingredient} · ${d.company}</div>
      <div style="margin-top:12px;">
        ${d.risks.map(r => `
          <div class="risk-bar risk-${r.level}" style="margin-bottom:8px;">
            <div class="risk-dot risk-dot-${r.level}"></div>
            <div class="risk-text">${r.text}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

const MSGS = [
  "아맞다! FDA 승인 받았었나? 🤔",
  "진짜 유사제품이 없을까? 🔍",
  "또 약가인하된거 아닌가? 💸",
  "삭감?? 헷갈려 😅",
  "아 행정처분 언제 받았지? 😬",
  "임상재평가는 어떻게 되지? 🧪"
];

const msgEl = document.getElementById('heroMsg');
let msgIdx = 0;
msgEl.textContent = MSGS[msgIdx];
msgEl.style.transition = 'opacity 0.5s';

setInterval(() => {
  msgEl.style.opacity = '0';
  setTimeout(() => {
    msgIdx = (msgIdx + 1) % MSGS.length;
    msgEl.textContent = MSGS[msgIdx];
    msgEl.style.opacity = '1';
  }, 500);
}, 3000);
</script>
