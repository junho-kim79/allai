<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://apis.data.go.kr https://openapi.neis.go.kr; img-src 'self' data: blob:;">
  <title>Allai - 제약 영업 실무 도구</title>
  <style>
    /* 네가 만든 예쁜 UI 스타일 그대로 유지 */
    :root {
      --green: #00C07F; --green2: #00A36C; --text: #111111; --sub: #6E6E73;
      --bg: #F4FAF7; --card: rgba(255,255,255,0.88); --line: rgba(255,255,255,0.7);
      --shadow: 0 18px 50px rgba(0, 80, 50, 0.08); --red: #ef4444; --yellow: #f59e0b; --blue: #3b82f6;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 16px; font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', sans-serif;
      background: radial-gradient(circle at top left, rgba(0,192,127,0.10), transparent 40%), linear-gradient(180deg, #F0FAF5 0%, #E4F5EC 100%);
      color: var(--text);
    }
    .phone-shell { width: 100%; max-width: 430px; background: rgba(255,255,255,0.62); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.75); border-radius: 38px; box-shadow: var(--shadow); padding: 16px; overflow: hidden; }
    .view-container { background: linear-gradient(180deg, rgba(255,255,255,0.92), rgba(255,255,255,0.82)); border: 1px solid var(--line); border-radius: 30px; min-height: 760px; padding: 24px 18px 20px; position: relative; }
    .dev-credit { position: absolute; bottom: 14px; right: 18px; font-size: 0.72rem; color: rgba(110,110,115,0.45); }
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
    .brand { font-size: 0.95rem; font-weight: 800; }
    .brand span { color: var(--green); }
    .beta-badge { padding: 3px 8px; border-radius: 999px; background: rgba(0,192,127,0.12); color: var(--green2); font-size: 0.68rem; font-weight: 800; border: 1px solid rgba(0,192,127,0.2); margin-left: 6px; }
    .step-chip { padding: 6px 12px; border-radius: 999px; background: rgba(0,192,127,0.10); color: var(--green2); font-size: 0.78rem; font-weight: 700; }
    .screen { display: none; animation: fadeUp 0.3s ease; }
    .screen.active { display: block; }
    .hero { margin: 20px 0 24px; }
    h1 { margin: 0 0 8px; font-size: 1.85rem; font-weight: 800; }
    .subtext { color: var(--sub); font-size: 0.92rem; }
    .choice-card { text-align: left; padding: 18px 16px; background: var(--card); border: 1px solid rgba(255,255,255,0.9); border-radius: 22px; cursor: pointer; transition: 0.2s; width: 100%; margin-bottom: 12px; }
    .choice-top { display: flex; justify-content: space-between; align-items: center; }
    .icon-badge { width: 44px; height: 44px; border-radius: 14px; display: flex; align-items: center; justify-content: center; background: rgba(0,192,127,0.12); font-size: 1.3rem; }
    .search-input { width: 100%; padding: 16px; border-radius: 20px; border: 1px solid rgba(17,17,17,0.08); font-size: 1rem; margin-bottom: 10px; }
    .result-list { display: grid; gap: 10px; max-height: 440px; overflow-y: auto; }
    .result-item { padding: 14px 16px; background: var(--card); border: 1px solid rgba(255,255,255,0.9); border-radius: 18px; cursor: pointer; }
    .badge { padding: 4px 10px; border-radius: 999px; font-size: 0.74rem; font-weight: 700; }
    .badge-green { background: rgba(0,192,127,0.12); color: var(--green2); }
    .badge-red { background: rgba(239,68,68,0.12); color: #b91c1c; }
    .badge-blue { background: rgba(59,130,246,0.12); color: #1d4ed8; }
    .badge-yellow { background: rgba(245,158,11,0.12); color: #92400e; }
    .info-card { padding: 16px; background: white; border-radius: 20px; margin-top: 10px; }
    .info-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 0.9rem; }
    .btn-primary { width: 100%; padding: 17px; background: var(--green); color: white; border: none; border-radius: 20px; font-weight: 800; cursor: pointer; margin-top: 15px; }
    .btn-back { background: none; border: none; color: var(--sub); cursor: pointer; margin-bottom: 10px; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<div class="phone-shell">
  <div class="view-container">
    <div class="dev-credit">dev. junho.kim</div>
    <div class="topbar">
      <div class="brand">All<span>ai</span><span class="beta-badge">BETA</span></div>
      <div class="step-chip" id="stepChip">홈</div>
    </div>

    <div class="screen active" id="screen1">
      <div class="hero" style="background:#111; border-radius:22px; padding:20px; color:white; min-height:140px;">
        <h1 style="font-size:1.5rem;">면담 1분 전</h1>
        <p id="heroMsg" style="font-size:0.85rem; color:rgba(255,255,255,0.8);"></p>
      </div>
      <div style="margin-top:20px;">
        <button class="choice-card" onclick="goScreen('screen2', '약품 검색')">
          <div class="choice-top"><div><h3>💊 실시간 약품 검색</h3><p>주사제 · 전문약 전 품목 조회</p></div><div class="icon-badge">🔍</div></div>
        </button>
        <button class="choice-card" onclick="goScreen('screen_icd', '상병코드')">
          <div class="choice-top"><div><h3>🏥 상병/효능 조회</h3><p>질환 키워드로 적응증 약품 매칭</p></div><div class="icon-badge">📋</div></div>
        </button>
      </div>
    </div>

    <div class="screen" id="screen2">
      <button class="btn-back" onclick="goScreen('screen1','홈')">← 홈으로</button>
      <input class="search-input" id="drugSearch" placeholder="약품명 입력 (예: 트리손, 케이캡)" oninput="handleSearch()">
      <div id="drugResults" class="result-list"></div>
    </div>

    <div class="screen" id="screen3">
      <button class="btn-back" onclick="goScreen('screen2','약품 검색')">← 검색 결과</button>
      <div id="drugDetail"></div>
    </div>

    <div class="screen" id="screen_icd">
      <button class="btn-back" onclick="goScreen('screen1','홈')">← 홈으로</button>
      <input class="search-input" id="icdSearch" placeholder="질환명 입력 (예: 위궤양, 간염)" oninput="handleICDSearch()">
      <div id="icdResults" class="result-list"></div>
    </div>

  </div>
</div>

<script>
// ── [설정] 본인의 API 서비스키를 입력하세요 ───────────────────────
const SERVICE_KEY = 'YOUR_ENCODED_SERVICE_KEY'; 

// 전역 데이터 저장소
window._apiCache = [];

// ── [API 1 & 2] 실시간 약품 검색 (주사제 포함) ───────────────────
let searchTimer = null;
function handleSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    const q = document.getElementById('drugSearch').value;
    if(q.length < 2) return;
    fetchDrugData(q);
  }, 500);
}

async function fetchDrugData(q) {
  const el = document.getElementById('drugResults');
  el.innerHTML = '<div style="text-align:center; padding:20px;">데이터 로딩 중...</div>';

  try {
    // 1. 의약품 제품 허가 정보 (메인 API - 주사제 등 모든 품목 포함)
    const url = `https://apis.data.go.kr/1471000/DrugPrdtPrmsnInfoService05/getDrugPrdtPrmsnInq05?serviceKey=${SERVICE_KEY}&item_name=${encodeURIComponent(q)}&type=json&numOfRows=15`;
    
    // 2. 행정처분 정보 (리스크 체크 API)
    const adminUrl = `https://apis.data.go.kr/1471000/DrugPrdtPrmsnInfoService05/getAdminntSttusInq05?serviceKey=${SERVICE_KEY}&item_name=${encodeURIComponent(q)}&type=json`;

    const [res, adminRes] = await Promise.all([
      fetch(url).then(r => r.json()),
      fetch(adminUrl).then(r => r.json()).catch(() => null)
    ]);

    const items = res.body?.items || [];
    const admins = adminRes?.body?.items || [];
    window._apiCache = items;

    if(items.length === 0) {
      el.innerHTML = '<div style="padding:20px; color:gray;">검색 결과가 없어. 오타를 확인해봐!</div>';
      return;
    }

    el.innerHTML = items.map((item, idx) => {
      const isBad = admins.some(a => a.ITEM_NAME === item.ITEM_NAME);
      return `
        <div class="result-item" onclick="showDetail(${idx})">
          <div style="font-weight:800; font-size:1rem;">${item.ITEM_NAME}</div>
          <div style="font-size:0.85rem; color:var(--sub); margin:4px 0;">${item.ENTP_NAME}</div>
          <div style="display:flex; gap:5px;">
            <span class="badge ${item.ETC_OTC_CODE==='전문의약품'?'badge-red':'badge-green'}">${item.ETC_OTC_CODE}</span>
            <span class="badge badge-blue">${item.MAKE_ITD_SPC_CODE || '허가'}</span>
            ${isBad ? '<span class="badge badge-yellow">⚠️ 처분이력</span>' : ''}
          </div>
        </div>
      `;
    }).join('');
  } catch(e) {
    el.innerHTML = '<div style="padding:20px; color:red;">API 연결 실패! 서비스키를 확인해줘.</div>';
  }
}

// ── [API 3] 약품 상세 & 복약정보 결합 ───────────────────────────
async function showDetail(idx) {
  const item = window._apiCache[idx];
  const detailEl = document.getElementById('drugDetail');
  detailEl.innerHTML = '상세 정보 불러오는 중...';

  // 3. e약은요 복약정보 API 조회
  const easyUrl = `https://apis.data.go.kr/1471000/DrbEasyDrugInfoService/getDrbEasyDrugList?serviceKey=${SERVICE_KEY}&itemName=${encodeURIComponent(item.ITEM_NAME)}&type=json`;
  const easyRes = await fetch(easyUrl).then(r => r.json()).catch(() => null);
  const easyInfo = easyRes?.body?.items?.[0];

  detailEl.innerHTML = `
    <div style="padding:10px 0;">
      <h2 style="margin:0;">${item.ITEM_NAME}</h2>
      <p style="color:var(--sub);">${item.ENTP_NAME}</p>
    </div>
    <div class="info-card">
      <div class="info-row"><span>품목기준코드</span><b>${item.ITEM_SEQ}</b></div>
      <div class="info-row"><span>허가일자</span><b>${item.ITEM_PERMIT_DATE}</b></div>
      <div class="info-row"><span>성상</span><b>${item.CHART.substring(0,20)}...</b></div>
    </div>
    ${easyInfo ? `
      <div class="info-card" style="background:#f0f9ff;">
        <h4 style="margin:0 0 10px; color:var(--blue);">💡 환자 복약 가이드</h4>
        <p style="font-size:0.85rem; line-height:1.5;"><b>효능:</b> ${easyInfo.efcyQesitm}</p>
        <p style="font-size:0.85rem; line-height:1.5;"><b>주의:</b> ${easyInfo.atpnQesitm.substring(0,100)}...</p>
      </div>
    ` : ''}
    <button class="btn-primary" onclick="goScreen('screen1','홈')">메인으로</button>
  `;
  goScreen('screen3', '상세 정보');
}

// ── [API 4 & 5] 상병/효능 기반 약품 조회 ──────────────────────────
function handleICDSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(async () => {
    const q = document.getElementById('icdSearch').value;
    if(q.length < 2) return;
    
    const el = document.getElementById('icdResults');
    const url = `https://apis.data.go.kr/1471000/DrugPrdtPrmsnInfoService05/getDrugPrdtPrmsnInq05?serviceKey=${SERVICE_KEY}&ee_doc_data=${encodeURIComponent(q)}&type=json&numOfRows=10`;
    
    const res = await fetch(url).then(r => r.json());
    const items = res.body?.items || [];
    
    el.innerHTML = items.map(i => `
      <div class="result-item" onclick="document.getElementById('drugSearch').value='${i.ITEM_NAME}'; fetchDrugData('${i.ITEM_NAME}'); goScreen('screen2','약품 검색');">
        <div style="font-weight:700;">${i.ITEM_NAME}</div>
        <div style="font-size:0.8rem; color:var(--blue);">적응증: ${q} 관련 확인됨</div>
      </div>
    `).join('') || '결과가 없습니다.';
  }, 500);
}

// ── UI 제어 함수 ────────────────────────────────────────────────
function goScreen(id, label) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById('stepChip').textContent = label;
}

// 랜덤 멘트 (지윤이 아빠 화이팅!)
const MSGS = ["FDA 승인 여부 확인했어? 🤔", "경쟁사 신제품 나왔나? 🔍", "행정처분 리스크 체크 필수! ⚠️", "오늘도 동원/경원/지윤 아빠 화이팅! ❤️"];
let mIdx = 0;
setInterval(() => {
  const el = document.getElementById('heroMsg');
  el.style.opacity = 0;
  setTimeout(() => {
    mIdx = (mIdx + 1) % MSGS.length;
    el.textContent = MSGS[mIdx];
    el.style.opacity = 1;
  }, 500);
}, 4000);
document.getElementById('heroMsg').textContent = MSGS[0];
</script>

</body>
</html>
