<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:; script-src * 'unsafe-inline' 'unsafe-eval'; style-src * 'unsafe-inline'; img-src * data: blob:; connect-src *;">
  <title>ALLAI – 면담 1분전</title>
  <script src="/drugPriceDB.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --g1: #2D9B6F;
      --g2: #1E7A54;
      --g3: #155C3E;
      --text: #1A1A1A;
      --sub: #6B7280;
      --sub2: #9CA3AF;
      --bg: #FAF7F2;
      --card: #FFFFFF;
      --card2: #F7F4EF;
      --border: rgba(0,0,0,0.07);
      --border2: rgba(45,155,111,0.18);
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.05);
      --shadow-md: 0 8px 24px rgba(0,0,0,0.07);
      --shadow-lg: 0 20px 60px rgba(80,50,0,0.10);
      --red: #EF4444;
      --yellow: #F59E0B;
      --blue: #3B82F6;
      --purple: #8B5CF6;
      --warm1: #FFF8F0;
      --warm2: #FDF3E7;
      --r-sm: 14px;
      --r-md: 20px;
      --r-lg: 28px;
      --r-xl: 36px;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0; padding: 16px;
      min-height: 100vh;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      background:
        radial-gradient(ellipse at top left, rgba(255,220,150,0.18), transparent 50%),
        radial-gradient(ellipse at bottom right, rgba(45,155,111,0.10), transparent 50%),
        linear-gradient(180deg, #FAF7F2 0%, #F3EDE3 100%);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    /* ── 앱 껍데기 ── */
    .app {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      background: transparent;
      position: relative;
      overflow: hidden;
    }

    /* ── 상단바 ── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      padding: 14px 20px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(250,247,242,0.90);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(180,140,80,0.10);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }
    .logo-mark {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--g1), var(--g3));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      box-shadow: 0 4px 12px rgba(45,155,111,0.25);
    }
    .logo-text {
      font-size: 1.1rem;
      font-weight: 900;
      letter-spacing: -0.04em;
      color: var(--text);
    }
    .logo-text em { color: var(--g1); font-style: normal; }
    .beta {
      font-size: 0.6rem;
      font-weight: 800;
      color: var(--g2);
      background: rgba(45,155,111,0.10);
      border: 1px solid rgba(45,155,111,0.18);
      border-radius: 999px;
      padding: 2px 7px;
      letter-spacing: 0.02em;
    }
    .chip {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--sub);
      background: rgba(255,255,255,0.85);
      border: 1px solid rgba(180,140,80,0.12);
      border-radius: 999px;
      padding: 5px 12px;
      box-shadow: var(--shadow-sm);
    }

    /* ── 화면 전환 ── */
    .screen { display: none; padding: 0 0 100px; animation: fadeUp 0.25s ease; }
    .screen.active { display: block; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── 홈 히어로 ── */
    .hero {
      margin: 0 16px 0;
      border-radius: var(--r-lg);
      overflow: hidden;
      position: relative;
      height: 210px;
      background: #1a1008;
      box-shadow: 0 8px 32px rgba(80,40,0,0.18);
    }
    .hero img {
      width: 100%; height: 210px;
      object-fit: cover; object-position: center 20%;
      opacity: 0.72; display: block;
      filter: saturate(0.85) warm(1);
    }
    .hero::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(30,10,0,0.15) 0%,
        rgba(20,8,0,0.55) 100%
      );
      border-radius: var(--r-lg);
    }
    .hero-content {
      position: absolute; inset: 0;
      padding: 22px 22px 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      z-index: 1;
    }
    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
      font-weight: 700;
      color: rgba(255,255,255,0.95);
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 999px;
      padding: 4px 10px;
      width: fit-content;
    }
    .hero-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.9); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }
    .hero-title {
      font-size: 2.4rem;
      font-weight: 900;
      letter-spacing: -0.06em;
      line-height: 0.95;
      color: #fff;
      text-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }
    .hero-title span { color: var(--g1); }
    .hero-sub {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.55);
      margin-top: 6px;
      min-height: 20px;
      transition: opacity 0.5s;
    }

    /* ── MR 한마디 ── */
    .mr-say-wrap {
      margin: 14px 16px 0;
    }
    .mr-say-card {
      background: linear-gradient(135deg, #FFF8ED, #FFF3E0);
      border: 1px solid rgba(245,158,11,0.2);
      border-radius: var(--r-md);
      padding: 14px 16px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      box-shadow: 0 4px 16px rgba(245,158,11,0.08);
    }
    .mr-say-icon {
      font-size: 1.4rem;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .mr-say-label {
      font-size: 0.68rem;
      font-weight: 800;
      color: #92400E;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .mr-say-text {
      font-size: 0.9rem;
      font-weight: 600;
      color: #78350F;
      line-height: 1.45;
    }

    /* ── 섹션 헤더 ── */
    .sec-head {
      padding: 20px 20px 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .sec-title {
      font-size: 0.78rem;
      font-weight: 800;
      color: var(--sub);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .sec-more {
      font-size: 0.75rem;
      color: var(--g1);
      font-weight: 700;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
    }

    /* ── 검색바 ── */
    .search-area { padding: 0 16px 4px; }
    .search-box {
      display: flex;
      align-items: center;
      gap: 0;
      background: var(--card);
      border: 1.5px solid rgba(180,140,80,0.12);
      border-radius: var(--r-md);
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(80,40,0,0.07);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-box:focus-within {
      border-color: var(--g1);
      box-shadow: 0 0 0 4px rgba(45,155,111,0.10), 0 4px 16px rgba(80,40,0,0.07);
    }
    .search-icon { padding: 0 14px 0 18px; color: var(--sub2); font-size: 1rem; flex-shrink: 0; }
    .search-input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 0.97rem;
      font-family: inherit;
      color: var(--text);
      padding: 16px 0;
      background: transparent;
    }
    .search-input::placeholder { color: var(--sub2); }
    .search-btn {
      background: linear-gradient(135deg, var(--g1), var(--g2));
      color: #fff;
      border: none;
      font-size: 0.85rem;
      font-weight: 800;
      font-family: inherit;
      padding: 0 20px;
      height: 54px;
      cursor: pointer;
      transition: opacity 0.15s;
      flex-shrink: 0;
    }
    .search-btn:active { opacity: 0.85; }

    /* ── 검색 탭 ── */
    .tabs-row {
      display: flex;
      gap: 6px;
      padding: 10px 16px 4px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tabs-row::-webkit-scrollbar { display: none; }
    .tab {
      flex-shrink: 0;
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      border: 1.5px solid var(--border);
      background: var(--card);
      color: var(--sub);
      transition: all 0.15s;
    }
    .tab.on { background: var(--g1); border-color: var(--g1); color: #fff; }

    /* ── 최근 검색 ── */
    .recent-list {
      padding: 0 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .recent-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 12px 6px 10px;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      transition: all 0.15s;
    }
    .recent-chip:hover { border-color: var(--g1); color: var(--g1); }
    .recent-chip .rc-del {
      color: var(--sub2);
      font-size: 0.7rem;
      padding: 2px;
      cursor: pointer;
    }
    .recent-chip .rc-del:hover { color: var(--red); }

    /* ── 기능 메뉴 그리드 ── */
    .menu-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 0 16px;
    }
    .menu-card {
      background: rgba(255,255,255,0.85);
      border: 1px solid rgba(180,140,80,0.10);
      border-radius: var(--r-md);
      padding: 20px 16px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 2px 12px rgba(80,40,0,0.06);
      text-align: left;
      position: relative;
      overflow: hidden;
    }
    .menu-card::before {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 60px; height: 60px;
      border-radius: 0 var(--r-md) 0 60px;
      opacity: 0.07;
    }
    .menu-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(80,40,0,0.10); }
    .menu-card:active { transform: translateY(0); }
    .menu-card.c-green::before { background: var(--g1); }
    .menu-card.c-blue::before { background: var(--blue); }
    .menu-card.c-yellow::before { background: var(--yellow); }
    .menu-card.c-purple::before { background: var(--purple); }
    .menu-card.c-red::before { background: var(--red); }
    .menu-icon { font-size: 1.8rem; margin-bottom: 10px; }
    .menu-name { font-size: 0.92rem; font-weight: 800; letter-spacing: -0.02em; color: var(--text); }
    .menu-desc { font-size: 0.75rem; color: var(--sub); margin-top: 4px; line-height: 1.4; }

    /* ── 피드백 ── */
    .feedback-bar {
      margin: 20px 16px 0;
      padding: 14px 18px;
      background: rgba(255,255,255,0.7);
      border: 1px solid rgba(180,140,80,0.10);
      border-radius: var(--r-md);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .feedback-text { font-size: 0.85rem; color: var(--sub); }
    .feedback-btn {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--g2);
      background: rgba(45,155,111,0.08);
      border: 1px solid rgba(45,155,111,0.18);
      border-radius: 999px;
      padding: 6px 14px;
      cursor: pointer;
      font-family: inherit;
      text-decoration: none;
    }

    /* ── 결과 리스트 ── */
    .result-wrap { padding: 0 16px; }
    .result-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 16px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.18s;
      box-shadow: var(--shadow-sm);
    }
    .result-item:hover { border-color: var(--g1); box-shadow: 0 4px 20px rgba(45,155,111,0.10); transform: translateY(-1px); }
    .result-name { font-size: 1rem; font-weight: 800; letter-spacing: -0.02em; }
    .result-sub { font-size: 0.82rem; color: var(--sub); margin-top: 4px; }
    .result-efcy { font-size: 0.8rem; color: var(--sub); margin-top: 8px; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .badges { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px; }
    .badge {
      display: inline-block;
      padding: 3px 9px;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 700;
    }
    .bg { background: rgba(0,192,127,0.1); color: var(--g2); }
    .bb { background: rgba(59,130,246,0.1); color: #1D4ED8; }
    .by { background: rgba(245,158,11,0.1); color: #92400E; }
    .br { background: rgba(239,68,68,0.1); color: #B91C1C; }
    .bk { background: rgba(0,0,0,0.06); color: var(--sub); }
    .bp { background: rgba(139,92,246,0.1); color: #6D28D9; }

    /* ── 뒤로가기 ── */
    .back-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px 16px;
    }
    .back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 7px 14px;
      font-size: 0.83rem;
      font-weight: 700;
      color: var(--sub);
      cursor: pointer;
      font-family: inherit;
      box-shadow: var(--shadow-sm);
    }

    /* ── 상세 화면 ── */
    .detail-wrap { padding: 0 16px; }
    .detail-header {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 22px;
      margin-bottom: 14px;
      box-shadow: var(--shadow-sm);
    }
    .detail-name { font-size: 1.4rem; font-weight: 900; letter-spacing: -0.04em; line-height: 1.2; }
    .detail-sub { font-size: 0.87rem; color: var(--sub); margin-top: 6px; }
    .detail-section { margin-bottom: 14px; }
    .sec-label {
      font-size: 0.72rem;
      font-weight: 800;
      color: var(--sub);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
      padding: 0 2px;
    }
    .info-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 0.88rem;
    }
    .info-row:last-child { border-bottom: none; }
    .info-l { color: var(--sub); font-size: 0.83rem; flex-shrink: 0; }
    .info-v { font-weight: 700; text-align: right; word-break: break-all; }

    /* ── AI 카드 ── */
    .ai-card {
      background: linear-gradient(135deg, rgba(0,192,127,0.07), rgba(59,130,246,0.05));
      border: 1px solid rgba(0,192,127,0.18);
      border-radius: var(--r-md);
      padding: 18px;
      margin-bottom: 14px;
    }
    .ai-head {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .ai-label {
      font-size: 0.72rem;
      font-weight: 800;
      color: var(--g2);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .ai-loading {
      display: inline-flex;
      gap: 4px;
      align-items: center;
      margin-left: auto;
    }
    .ai-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--g1);
      animation: dotBounce 1.2s ease infinite;
    }
    .ai-dot:nth-child(2) { animation-delay: 0.2s; }
    .ai-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotBounce { 0%,80%,100%{transform:translateY(0);opacity:0.4} 40%{transform:translateY(-4px);opacity:1} }
    .ai-body { font-size: 0.88rem; line-height: 1.7; color: var(--text); }

    .mr-card {
      background: linear-gradient(135deg, rgba(245,158,11,0.07), rgba(245,158,11,0.03));
      border: 1px solid rgba(245,158,11,0.2);
      border-radius: var(--r-md);
      padding: 18px;
      margin-bottom: 14px;
    }
    .mr-head { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .mr-label { font-size: 0.72rem; font-weight: 800; color: #92400E; letter-spacing: 0.04em; text-transform: uppercase; }
    .mr-point { display: flex; gap: 10px; margin-bottom: 10px; }
    .mr-point:last-child { margin-bottom: 0; }
    .mr-num {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: rgba(245,158,11,0.18);
      color: #92400E;
      font-size: 0.72rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .mr-txt { font-size: 0.87rem; line-height: 1.6; color: var(--text); }

    /* ── 삭감 위험 ── */
    .risk-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 16px;
      border-radius: var(--r-sm);
      margin-bottom: 8px;
      font-size: 0.85rem;
      line-height: 1.5;
    }
    .risk-item.low { background: rgba(0,192,127,0.07); border: 1px solid rgba(0,192,127,0.15); }
    .risk-item.mid { background: rgba(245,158,11,0.07); border: 1px solid rgba(245,158,11,0.15); }
    .risk-item.high { background: rgba(239,68,68,0.07); border: 1px solid rgba(239,68,68,0.15); }
    .risk-dot-wrap { width: 10px; height: 10px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
    .low .risk-dot-wrap { background: var(--g1); }
    .mid .risk-dot-wrap { background: var(--yellow); }
    .high .risk-dot-wrap { background: var(--red); }

    /* ── 경쟁품 ── */
    .comp-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 13px 16px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: var(--shadow-sm);
    }
    .comp-item:hover { border-color: var(--g1); }
    .comp-name { font-size: 0.93rem; font-weight: 700; }
    .comp-sub { font-size: 0.78rem; color: var(--sub); margin-top: 2px; }
    .comp-price { font-weight: 800; color: var(--g2); font-size: 0.92rem; flex-shrink: 0; }

    /* ── 빈 상태 ── */
    .empty { padding: 40px 20px; text-align: center; color: var(--sub2); font-size: 0.9rem; line-height: 1.7; }

    /* ── 처방 통계 차트 ── */
    .chart-wrap { padding: 0 2px; }
    .bar-group { display: flex; gap: 6px; align-items: flex-end; height: 90px; margin-bottom: 6px; }
    .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .bar-val { font-size: 0.68rem; font-weight: 700; color: var(--g2); }
    .bar-track { width: 100%; background: rgba(0,0,0,0.06); border-radius: 6px 6px 0 0; height: 70px; display: flex; align-items: flex-end; overflow: hidden; }
    .bar-fill { width: 100%; border-radius: 6px 6px 0 0; transition: height 0.3s; }
    .bar-year { font-size: 0.68rem; color: var(--sub); }

    /* ── ICD 칩 ── */
    .icd-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(59,130,246,0.07);
      border: 1px solid rgba(59,130,246,0.15);
      border-radius: 10px;
      padding: 7px 12px;
      margin: 3px;
      cursor: pointer;
      transition: all 0.15s;

const RECENT_KEY = 'allai_recent_v1';

function getRecent() {

}
function saveRecent(name, id) {
  let list = getRecent().filter(x => x.id !== id);
  list.unshift({ name, id, savedAt: new Date().toISOString() });
  if (list.length > 10) list = list.slice(0, 10);
  localStorage.setItem(RECENT_KEY, JSON.stringify(list));
  renderRecent();

    { id:6, text:'삭감 걱정되는 처방은 미리 조회해두세요 🛡️', startDay:21, endDay:25, active:true, reusable:true, lastShownAt:null, priority:1 }
  ];
}

function getMrSays() {
  try {
    const saved = JSON.parse(localStorage.getItem(MR_SAY_KEY));
    return Array.isArray(saved) ? saved : defaultMrSays();
  } catch { return defaultMrSays(); }
}
function saveMrSays(list) {
  localStorage.setItem(MR_SAY_KEY, JSON.stringify(list));
}

function getTodayMrSay() {
  const day = new Date().getDate();
  const list = getMrSays();
  const now = Date.now();

  let candidates = list.filter(s => {
    if (!s.active) return false;
    if (day < s.startDay || day > s.endDay) return false;
    if (s.lastShownAt) {
      const diff = (now - new Date(s.lastShownAt).getTime()) / (1000*60*60*24);
      if (diff < 3 && !s.reusable) return false;
    }
    return true;
  });

  if (!candidates.length) candidates = list.filter(s => s.active && day >= s.startDay && day <= s.endDay);
  if (!candidates.length) return null;

  candidates.sort((a,b) => (b.priority||0) - (a.priority||0));
  const pick = candidates[0];

  // lastShownAt 업데이트
  const updated = list.map(s => s.id === pick.id ? {...s, lastShownAt: new Date().toISOString()} : s);
  saveMrSays(updated);
  return pick;
}

function renderMrSay() {
  const el = document.getElementById('mrSayWrap');
  const say = getTodayMrSay();
  if (!say) { el.innerHTML = ''; return; }
  el.innerHTML = `
    <div class="mr-say-card">
      <div class="mr-say-icon">📣</div>
      <div>
        <div class="mr-say-label">오늘 MR 한마디</div>
        <div class="mr-say-text">${say.text}</div>
      </div>
    </div>`;
}

let _prevScreen = 'screen2';
let _isPopState = false;

function goScreen(id, label, push=true) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById('stepChip').textContent = label || LABELS[id] || '';
  if (id === 'screen_stat') renderStat();
  if (push && !_isPopState) history.pushState({ screen:id, label }, '', `#${id}`);
  window.scrollTo({ top:0, behavior:'smooth' });
}

function goDetail(prevScreen, push=true) {
  _prevScreen = prevScreen;
  goScreen('screen3', '약품 상세', push);
}

window.addEventListener('popstate', e => {
  const s = e.state;
  _isPopState = true;
  if (!s || !s.screen) { goScreen('screen1','홈',false); }
  else if (s.screen === 'screen3') { goDetail(_prevScreen, false); }
  else { goScreen(s.screen, s.label || LABELS[s.screen] || '', false); }
  _isPopState = false;
});

window.addEventListener('load', () => {
  const hash = location.hash.replace('#','');
  const first = hash && document.getElementById(hash) ? hash : 'screen1';
  history.replaceState({ screen:first, label:LABELS[first] }, '', `#${first}`);
  if (first !== 'screen1') goScreen(first, LABELS[first], false);
});

function normalizeDrugName(n) {
  if (!n) return '';
  return String(n).toLowerCase().replace(/_.*$/g,'').replace(/㎎/g,'mg').replace(/밀리그램/g,'mg').replace(/\s+/g,'').replace(/[·•ㆍ]/g,'').replace(/[(){}\[\]]/g,'').replace(/\/+/g,'').replace(/-+/g,'').trim();
}

function getDrugPrice(itemName) {
  if (typeof DRUG_PRICE_DB === 'undefined') return '-';
  if (!itemName) return '-';
  const name = normalizeDrugName(itemName);
  let best = null, bestScore = -1;
  for (const d of DRUG_PRICE_DB) {
    const dbName = normalizeDrugName(d.n || '');
    let score = 0;
    if (dbName === name) score = 100;
    else if (dbName.startsWith(name) || name.startsWith(dbName)) score = 85;
    else if (dbName.includes(name) || name.includes(dbName)) score = 70;
    if (score > bestScore) { bestScore = score; best = d; }
  }
  return best && bestScore >= 65 ? best.p.toLocaleString() + '원' : '-';
}

function renderMrPoints(points) {
  if (!Array.isArray(points) || !points.length) return '';
  return points.map((p, i) => `<div class="mr-point"><div class="mr-num">${i+1}</div><div class="mr-txt">${p}</div></div>`).join('');
}

/* AI 요약 (순차 호출) */
async function fetchAISummary(name, ingr, company, efcy, useMethod, cacheKey) {
  try {
    const prompt = `당신은 제약 영업사원(MR) 전문 AI입니다.
약품명: ${name}
성분: ${ingr}
제조사: ${company}
적응증: ${efcy ? efcy.substring(0,200) : '정보없음'}
용법: ${useMethod ? useMethod.substring(0,150) : '정보없음'}

[AI_SUMMARY]
계열, 작용기전, 핵심 적응증을 2문장으로 간결하게 요약. MR이 30초 안에 이해할 수 있도록.

[MR_POINTS]
면담 시 의사에게 강조할 포인트 3가지를 번호 목록으로. 각 1~2문장.

[FDA]
이 약품의 FDA 승인 여부를 한 줄로. 예) "승인 (GERD, 소화성궤양)" 또는 "미승인 (국내 허가)" 또는 "성분 FDA 승인, 해당 제품은 국내 허가". 모르면 "확인 필요".

반드시 [AI_SUMMARY], [MR_POINTS], [FDA] 태그 모두 포함.`;

    const res = await fetch('/api/ai', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ prompt, maxTokens:600 })
    });
    const data = await res.json();
    const text = data?.text?.trim() || '';

    const summaryMatch = text.match(/\[AI_SUMMARY\]([\s\S]*?)(?=\[MR_POINTS\]|$)/);
    const mrMatch = text.match(/\[MR_POINTS\]([\s\S]*?)(?=\[FDA\]|$)/);
    const fdaMatch = text.match(/\[FDA\]([\s\S]*?)$/);
    const summary = summaryMatch ? summaryMatch[1].trim() : text.substring(0,200);
    const mrRaw = mrMatch ? mrMatch[1].trim() : '';
    const mrPoints = mrRaw.split(/\n?\d+\.\s+/).filter(p => p.trim());
    const fda = fdaMatch ? fdaMatch[1].trim() : '-';

    // 캐시 저장
    AI_CACHE[cacheKey] = { summary, mrPoints, fda };

    // UI 업데이트
    const aiBody = document.getElementById('aiBody');
    const mrBody = document.getElementById('mrBody');
    const aiCard = document.getElementById('aiCard');
    const mrCard = document.getElementById('mrCard');
    const fdaEl = document.getElementById('fdaVal');

    if (aiBody) {
      aiBody.textContent = summary;
      const loader = aiCard?.querySelector('.ai-loading');
      if (loader) loader.remove();
    }
    if (mrBody && mrPoints.length) {
      mrBody.innerHTML = renderMrPoints(mrPoints);
      const loader = mrCard?.querySelector('.ai-loading');
      if (loader) loader.remove();
    }
    if (fdaEl) {
      fdaEl.textContent = fda;
      fdaEl.style.color = fda.includes('승인') && !fda.includes('미승인') ? 'var(--g2)' : 'var(--sub)';
    }
  } catch(e) {
    const aiBody = document.getElementById('aiBody');
    const mrBody = document.getElementById('mrBody');
    if (aiBody) aiBody.textContent = 'AI 요약을 불러올 수 없습니다.';
    if (mrBody) mrBody.innerHTML = '<div style="font-size:0.85rem;color:var(--sub);">MR 포인트를 불러올 수 없습니다.</div>';
  }
}

function drawChart(drugId) {
  const data = TREND_DATA[drugId];
  if (!data) return '';
  const vals = data[currentRegion];
  const max = Math.max(...vals);
  const bars = data.years.map((y, i) => {
    const pct = Math.round((vals[i]/max)*100);
    const isLast = i === data.years.length-1;
    return `<div class="bar-col">
      <div class="bar-val">${vals[i]}</div>
      <div class="bar-track"><div class="bar-fill" style="height:${pct}%;background:${isLast?'var(--g1)':'rgba(0,192,127,0.3)'}"></div></div>
      <div class="bar-year">${y}</div>
    </div>`;
  }).join('');

  return `<div class="detail-section">
    <div class="sec-label" style="display:flex;justify-content:space-between;align-items:center;">
      <span>처방 추이 (만건)</span>

      </div>

    <div class="info-card" style="padding:16px 12px 12px;">

}

      <div class="sec-label" style="padding:0 2px 10px;">성분별 처방 추이 (전국, 만건)</div>
      <div class="info-card" style="padding:18px 14px;margin-bottom:14px;">
        ${entries.map(([name,vals],ci)=>`
          <div style="margin-bottom:18px;">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:7px;">
              <div style="width:10px;height:10px;border-radius:50%;background:${colors[ci]};"></div>
              <span style="font-size:0.8rem;font-weight:700;">${name}</span>
              <span style="margin-left:auto;font-size:0.72rem;color:${vals[4]>vals[0]?'var(--g2)':'var(--red)'};font-weight:700;">${vals[4]>vals[0]?'▲':'▼'}${Math.abs(vals[4]-vals[0])}만</span>
            </div>
            <div style="display:flex;gap:4px;align-items:flex-end;height:60px;">
              ${years.map((y,i)=>`
                <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;">
                  <div style="width:100%;background:rgba(0,0,0,0.06);border-radius:4px 4px 0 0;height:50px;display:flex;align-items:flex-end;overflow:hidden;">
                    <div style="width:100%;height:${Math.round(vals[i]/maxVal*100)}%;background:${colors[ci]};opacity:${0.3+i*0.17};border-radius:4px 4px 0 0;"></div>
                  </div>
                  <div style="font-size:0.6rem;color:var(--sub);">${y.slice(2)}</div>
                </div>`).join('')}
            </div>
          </div>`).join('')}
      </div>`;
  } else {
    const ranking = [
      {name:'넥시움정 20mg',val:85,color:'var(--blue)'},
      {name:'케이캡정 50mg',val:95,color:'var(--g1)'},
      {name:'파리에트정 10mg',val:48,color:'var(--yellow)'},
      {name:'라베린정 10mg',val:50,color:'var(--purple)'},
      {name:'란스톤캡슐 30mg',val:38,color:'#F97316'}
    ].sort((a,b)=>b.val-a.val);
    const maxVal = ranking[0].val;
    el.innerHTML = `
      <div class="sec-label" style="padding:0 2px 10px;">품목별 처방 순위 (2025년, 전국, 만건)</div>
      <div class="info-card" style="padding:18px 14px;">
        ${ranking.map((r,i)=>`
          <div style="margin-bottom:14px;">
            <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
              <span style="font-size:0.84rem;font-weight:700;">${i+1}. ${r.name}</span>
              <span style="font-size:0.84rem;font-weight:800;color:${r.color};">${r.val}만건</span>
            </div>
            <div style="height:12px;background:rgba(0,0,0,0.06);border-radius:6px;overflow:hidden;">
              <div style="height:100%;width:${Math.round(r.val/maxVal*100)}%;background:${r.color};border-radius:6px;"></div>
            </div>
          </div>`).join('')}
        <div style="text-align:center;font-size:0.72rem;color:var(--sub2);margin-top:8px;">※ 샘플 데이터</div>
      </div>`;
  }
}
